# =============================================================================
# Costmap Configuration
# =============================================================================
#
# Two costmaps are used:
#
# 1. LOCAL COSTMAP (3x3m rolling window):
#    - Centered on the robot, moves with it
#    - Uses voxel_layer for real-time obstacle detection from /scan
#    - Used by the local planner (DWB) for obstacle avoidance
#
# 2. GLOBAL COSTMAP (full map):
#    - Covers the entire known map
#    - Uses static_layer (the /map from map_server) + obstacle_layer
#    - Used by the global planner (NavFn) for path planning
#
# Both costmaps use an inflation_layer that expands obstacles by
# `inflation_radius` with exponential falloff controlled by
# `cost_scaling_factor`. This keeps the robot away from obstacles.
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# Local Costmap — real-time obstacle avoidance
# ─────────────────────────────────────────────────────────────────────────────
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["voxel_layer", "inflation_layer"]

      # Voxel layer: 3D obstacle detection from laser scan
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.08
          obstacle_max_range: 2.5
          obstacle_min_range: 0.08

      # Inflation layer: creates cost gradient around obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: True

# ─────────────────────────────────────────────────────────────────────────────
# Global Costmap — path planning over the full map
# ─────────────────────────────────────────────────────────────────────────────
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.35
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Static layer: loads the pre-built map
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # Obstacle layer: adds real-time laser obstacles
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.08
          obstacle_max_range: 2.5
          obstacle_min_range: 0.08

      # Inflation layer: cost gradient around obstacles
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

      always_send_full_costmap: True
