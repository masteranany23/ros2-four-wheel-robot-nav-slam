# =============================================================================
# AMCL — Adaptive Monte Carlo Localization Configuration
# =============================================================================
#
# AMCL implements a particle filter to estimate the robot's pose within a
# known map. Each particle represents a hypothesis of the robot's position
# and orientation. Particles are weighted by how well the expected laser
# scan from that pose matches the actual scan received.
#
# Inputs:
#   /scan  (sensor_msgs/LaserScan)    — LiDAR measurements
#   /map   (nav_msgs/OccupancyGrid)   — pre-built map from SLAM
#   TF: odom → base_footprint         — wheel odometry
#
# Outputs:
#   /amcl_pose  (geometry_msgs/PoseWithCovarianceStamped) — estimated pose
#   TF: map → odom                    — localization correction transform
#   /particle_cloud                    — particle distribution (for debug)
# =============================================================================

amcl:
  ros__parameters:
    # ----- Motion Model -----
    # Differential drive motion model noise parameters (alpha1-5).
    # These define how much noise the odometry adds to the particle filter.
    # alpha1: rotational noise from rotation
    # alpha2: rotational noise from translation
    # alpha3: translational noise from translation
    # alpha4: translational noise from rotation
    # alpha5: translational noise (holonomic only)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # ----- Particle Filter -----
    # AMCL dynamically adjusts particle count between min and max.
    # KLD-sampling (pf_err/pf_z) determines when to reduce particles
    # as the distribution converges.
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05           # Max error between true and estimated distribution
    pf_z: 0.99             # Upper quantile for particle set size
    resample_interval: 1   # Resample every N filter updates

    # Recovery: set to 0.0 to disable exponential recovery
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001

    # ----- Laser Model -----
    # likelihood_field: fast and robust for structured environments.
    # Computes probability of each laser endpoint by distance to nearest
    # obstacle in the map.
    laser_model_type: "likelihood_field"
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    max_beams: 60
    sigma_hit: 0.2
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

    # ----- Frame Configuration -----
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"
    tf_broadcast: true
    transform_tolerance: 1.0

    # ----- Update Thresholds -----
    # Filter only updates when robot moves this far or rotates this much.
    update_min_d: 0.25      # meters
    update_min_a: 0.2       # radians
    save_pose_rate: 0.5

    # ----- Scan Topic -----
    scan_topic: scan

    # ----- Initial Pose -----
    # Can be set via RViz "2D Pose Estimate" tool or here:
    # set_initial_pose: true
    # initial_pose:
    #   x: 0.0
    #   y: 0.0
    #   yaw: 0.0

    # ----- Beam Skip (disabled for reliability) -----
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3

# =============================================================================
# Map Server — serves the pre-built occupancy grid map
# =============================================================================
map_server:
  ros__parameters:
    yaml_filename: ""   # Overridden by launch argument
    topic_name: "map"
    frame_id: "map"

# =============================================================================
# Lifecycle Manager — manages AMCL + Map Server lifecycle
# =============================================================================
lifecycle_manager:
  ros__parameters:
    autostart: true
    node_names:
      - "map_server"
      - "amcl"
    bond_timeout: 4.0
